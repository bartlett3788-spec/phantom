<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phantom</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Phantom" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    :root {
      --bg:        #1a1a1a;
      --bg2:       #242424;
      --bg3:       #2e2e2e;
      --border:    #3a3a3a;
      --border2:   #444;
      --text:      #f0f0f0;
      --text2:     #aaa;
      --text3:     #666;
      --yellow:    #e8ff00;
      --orange:    #ff6a00;
      --pink:      #ff2d78;
      --radius:    10px;
      --radius-lg: 14px;
      --font:      -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:var(--font);background:var(--bg);color:var(--text);max-width:680px;margin:0 auto;padding:0 16px;min-height:100vh}
    a{color:var(--yellow)}

    /* NAV */
    .nav-bar{display:flex;align-items:center;border-bottom:1px solid var(--border);margin-bottom:1.5rem;padding-top:12px}
    .nav-logo{display:flex;align-items:center;gap:10px;margin-right:auto;padding-bottom:12px}
    .nav-logo-mark{width:32px;height:32px;background:var(--yellow);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#000;font-weight:800;font-size:14px;letter-spacing:-1px}
    .nav-logo-name{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.5px}
    .nav-links{display:flex}
    .nav-link{padding:10px 11px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
    .nav-link:hover{color:var(--text)}
    .nav-link.active{color:var(--yellow);font-weight:600;border-bottom-color:var(--yellow)}
    .bottom-nav{display:flex;border-top:1px solid var(--border);padding:.5rem 0 .25rem;margin-top:2rem;position:sticky;bottom:0;background:var(--bg)}
    .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:.5rem;transition:all .15s}
    .bn-icon{font-size:20px;color:var(--text3)}
    .bn-label{font-size:10px;color:var(--text3)}
    .bn-item.active .bn-icon{color:var(--yellow)}
    .bn-item.active .bn-label{color:var(--yellow);font-weight:600}

    /* SCREENS */
    .screen{display:none}.screen.visible{display:block}
    .app-tab{display:none;padding-bottom:90px}

    /* CHIPS */
    .chip{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;border:1px solid var(--border2);font-size:13px;color:var(--text2);background:var(--bg2);cursor:pointer;user-select:none;transition:all .15s}
    .chip:hover{border-color:var(--yellow);color:var(--text)}
    .chip.active{background:var(--yellow);color:#000;border-color:var(--yellow);font-weight:600}
    .chip.warn.active{background:var(--pink);color:#fff;border-color:var(--pink)}
    .chip-tk{font-size:11px;display:none}
    .chip.active .chip-tk{display:inline}

    /* DAY CHIPS */
    .days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:1.25rem}
    .day-chip{padding:10px 4px 5px;border-radius:var(--radius);border:1px solid var(--border2);font-size:12px;text-align:center;cursor:pointer;color:var(--text2);background:var(--bg2);user-select:none;transition:all .15s}
    .day-chip:hover{border-color:var(--yellow)}
    .day-chip.active{background:var(--yellow);color:#000;border-color:var(--yellow);font-weight:700}
    .day-tk{display:none;font-size:9px;margin-top:3px}
    .day-chip.active .day-tk{display:block}

    /* STRUCTURE CARDS */
    .struct-card{border:1px solid var(--border2);border-radius:var(--radius);padding:.875rem 1rem;cursor:pointer;transition:all .15s;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;background:var(--bg2)}
    .struct-card:hover{border-color:var(--yellow)}
    .struct-card.sel{border:2px solid var(--yellow);background:var(--bg3)}
    .struct-icon{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s;font-size:11px;color:transparent}
    .struct-card.sel .struct-icon{background:var(--yellow);border-color:var(--yellow);color:#000}
    .struct-title{font-size:13px;font-weight:600;color:var(--text)}
    .struct-desc{font-size:12px;color:var(--text2);margin-top:2px}

    /* DAY STRIP */
    .day-strip{display:flex;gap:5px;margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .ds-btn{min-width:44px;padding:8px 6px;border-radius:var(--radius);border:1px solid var(--border2);font-size:12px;text-align:center;cursor:pointer;color:var(--text2);background:var(--bg2);transition:all .15s;user-select:none;flex-shrink:0}
    .ds-btn:hover{border-color:var(--yellow)}
    .ds-btn.viewing{background:var(--yellow);color:#000;border-color:var(--yellow);font-weight:700}
    .ds-btn.rest-day{border-style:dashed}
    .ds-btn.today-dot::after{content:'';display:block;width:4px;height:4px;border-radius:50%;background:var(--orange);margin:3px auto 0}

    /* CARDS */
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:1rem}
    .card-head{padding:.875rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .card-title{font-size:14px;font-weight:600;color:var(--text)}
    .stats-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1rem}
    .stat-c{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem 1rem;text-align:center}
    .stat-n{font-size:22px;font-weight:700;color:var(--yellow)}
    .stat-l{font-size:11px;color:var(--text2);margin-top:3px}

    /* FORM */
    .section-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
    .section-hint{font-size:12px;color:var(--text2);margin-bottom:.75rem;line-height:1.5}
    .name-input{width:100%;padding:13px 16px;border-radius:var(--radius);border:1px solid var(--border2);font-size:18px;font-weight:600;color:var(--text);background:var(--bg2);margin-bottom:.75rem;transition:border .15s}
    .name-input:focus{outline:none;border-color:var(--yellow)}
    .stat-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem}
    .stat-card{background:var(--bg3);border-radius:var(--radius);padding:.875rem;border:1px solid var(--border)}
    .stat-lbl{font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
    .stat-inp{width:100%;padding:0;border:none;background:transparent;font-size:22px;font-weight:700;color:var(--yellow)}
    .stat-inp:focus{outline:none}
    .stat-unit{font-size:12px;color:var(--text2);margin-top:2px}
    .stat-sel{width:100%;border:none;background:transparent;font-size:18px;font-weight:700;color:var(--yellow);padding:0}
    .range-block{margin-bottom:1.25rem}
    .range-header{display:flex;justify-content:space-between;margin-bottom:8px}
    .range-label{font-size:13px;color:var(--text2)}
    .range-val{font-size:13px;font-weight:700;color:var(--yellow)}
    .range-row{display:flex;align-items:center;gap:10px}
    .range-row span{font-size:12px;color:var(--text3)}
    .range-row input[type=range]{flex:1;accent-color:var(--yellow)}

    /* BUTTONS */
    .btn-pri{width:100%;padding:14px;border-radius:var(--radius);border:none;background:var(--yellow);color:#000;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;margin-top:.5rem;letter-spacing:-.2px}
    .btn-pri:hover{opacity:.88}
    .btn-pri:disabled{opacity:.35;cursor:not-allowed}
    .btn-sec{width:100%;padding:14px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;font-size:15px;font-weight:600;color:var(--text);cursor:pointer;margin-top:.5rem;transition:all .15s}
    .btn-sec:hover{border-color:var(--yellow);color:var(--yellow)}
    .btn-ghost{background:none;border:none;font-size:13px;color:var(--text3);cursor:pointer;padding:8px;display:block;margin:0 auto;transition:color .15s}
    .btn-ghost:hover{color:var(--text2)}
    .btn-danger{width:100%;padding:13px;border-radius:var(--radius);border:1px solid var(--pink);background:transparent;font-size:14px;font-weight:600;color:var(--pink);cursor:pointer;margin-top:.5rem}

    /* ONBOARDING */
    .ob-wrap{max-width:480px;margin:0 auto;padding:1rem 0}
    .ob-logo{width:56px;height:56px;background:var(--yellow);border-radius:14px;display:flex;align-items:center;justify-content:center;color:#000;font-weight:900;font-size:20px;margin:0 auto 1.25rem;letter-spacing:-1px}
    .avatar-large{width:72px;height:72px;border-radius:50%;background:var(--bg3);border:2px solid var(--yellow);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:var(--yellow);margin:0 auto 1rem}
    .ob-progress{display:flex;gap:4px;margin-bottom:2rem}
    .ob-dot{height:3px;border-radius:2px;background:var(--border2);flex:1;transition:background .3s}
    .ob-dot.done,.ob-dot.active{background:var(--yellow)}
    .ob-title{font-size:24px;font-weight:700;color:var(--text);margin-bottom:6px;letter-spacing:-.5px}
    .ob-sub{font-size:14px;color:var(--text2);margin-bottom:1.5rem;line-height:1.6}
    .ob-card{background:var(--bg3);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;border:1px solid var(--border)}
    .summary-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
    .summary-row:last-child{border-bottom:none}
    .summary-key{font-size:13px;color:var(--text2)}
    .summary-val{font-size:13px;font-weight:600;color:var(--text);text-align:right;max-width:65%}

    /* GENERATING */
    .generating-wrap{text-align:center;padding:3rem 0}
    .gen-steps{display:flex;flex-direction:column;gap:10px;text-align:left;max-width:280px;margin:1.5rem auto 0}
    .gen-step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text3)}
    .gen-step.ga{color:var(--yellow);font-weight:600}
    .gen-step.gd{color:var(--text2)}
    .gen-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0}
    .gen-dot.ga{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
    .gen-dot.gd{background:var(--text2)}
    .spinner{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--yellow);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* SESSION */
    .ex-table{width:100%;border-collapse:collapse}
    .ex-table th{font-size:11px;font-weight:700;color:var(--text3);text-align:left;padding:8px 1.25rem;border-bottom:1px solid var(--border);background:var(--bg3);text-transform:uppercase;letter-spacing:.05em}
    .ex-table th:not(:first-child){text-align:center}
    .ex-table td{padding:10px 1.25rem;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);vertical-align:middle}
    .ex-table td:not(:first-child){text-align:center}
    .ex-table tr:last-child td{border-bottom:none}
    .ex-table tr:hover td{background:var(--bg3)}
    .log-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border2);background:transparent;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;font-weight:600}
    .log-btn:hover{border-color:var(--orange);color:var(--orange)}
    .log-btn.done{background:var(--yellow);color:#000;border-color:var(--yellow)}
    .progress-wrap{padding:.75rem 1.25rem 1rem;border-top:1px solid var(--border)}
    .progress-header{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:8px}
    .progress-header span:last-child{color:var(--yellow);font-weight:700}
    .progress-track{height:5px;background:var(--border);border-radius:3px}
    .progress-fill{height:5px;background:linear-gradient(90deg,var(--yellow),var(--orange));border-radius:3px;transition:width .4s}
    .finisher-card{background:var(--bg3);border-left:3px solid var(--orange);border-radius:0 var(--radius) var(--radius) 0;padding:.875rem 1.25rem;margin:0 1.25rem 1.25rem}
    .finisher-title{font-size:13px;font-weight:700;color:var(--orange);margin-bottom:4px}
    .finisher-item{font-size:12px;color:var(--text2);padding:1px 0}

    /* TIMER */
    .timer-bar{display:flex;align-items:center;gap:12px;padding:10px 1.25rem;background:var(--bg3);border-bottom:1px solid var(--border)}
    .timer-ring{position:relative;width:44px;height:44px;flex-shrink:0}
    .timer-ring svg{transform:rotate(-90deg)}
    .timer-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--yellow)}

    /* PROGRAMME */
    .week-nav{display:flex;border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:1.25rem}
    .wk-btn{flex:1;padding:10px;font-size:13px;font-weight:600;border:none;background:transparent;color:var(--text2);cursor:pointer;border-right:1px solid var(--border2);transition:all .15s}
    .wk-btn:last-child{border-right:none}
    .wk-btn:hover{color:var(--yellow)}
    .wk-btn.active{background:var(--yellow);color:#000}
    .wk-btn.w4{color:var(--orange)}.wk-btn.w4.active{background:var(--orange);color:#000}
    .day-card{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:.75rem;background:var(--bg2)}
    .day-head{padding:.875rem 1.25rem;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .day-body{padding:.75rem 1.25rem}
    .ex-row-ai{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
    .ex-row-ai:last-child{border-bottom:none}
    .ex-num{width:24px;height:24px;border-radius:50%;background:var(--yellow);color:#000;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}

    /* TOGGLES */
    .toggle-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border)}
    .toggle-row:last-child{border-bottom:none}
    .toggle{position:relative;width:46px;height:26px;flex-shrink:0}
    .toggle input{opacity:0;width:0;height:0}
    .toggle-slider{position:absolute;inset:0;background:var(--border2);border-radius:13px;cursor:pointer;transition:.2s}
    .toggle-slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
    .toggle input:checked+.toggle-slider{background:var(--yellow)}
    .toggle input:checked+.toggle-slider:before{transform:translateX(20px);background:#000}

    /* PROFILE ROWS */
    .profile-row{display:flex;align-items:center;justify-content:space-between;padding:10px 1.25rem;border-bottom:1px solid var(--border)}
    .profile-row:last-child{border-bottom:none}
    .pr-key{font-size:13px;color:var(--text2)}
    .pr-val{font-size:13px;font-weight:600;color:var(--text);text-align:right;max-width:60%}

    /* API SETUP */
    .api-setup{background:var(--bg3);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1rem;border:1px solid var(--border)}
    .api-input{width:100%;padding:11px 14px;border-radius:var(--radius);border:1px solid var(--border2);font-size:14px;color:var(--text);background:var(--bg);margin-bottom:.75rem;font-family:monospace;transition:border .15s}
    .api-input:focus{outline:none;border-color:var(--yellow)}

    /* SESSION BADGE */
    .sess-badge{padding:3px 12px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.03em}

    /* NEON GLOW ON ACTIVE ELEMENTS */
    .log-btn.done{box-shadow:0 0 8px rgba(232,255,0,.3)}
    .btn-pri{box-shadow:0 0 16px rgba(232,255,0,.2)}
    .stat-n{text-shadow:0 0 20px rgba(232,255,0,.3)}
    .wk-btn.active{box-shadow:inset 0 0 0 0 transparent}
    .day-chip.active,.ds-btn.viewing{box-shadow:0 0 8px rgba(232,255,0,.2)}
  </style>
</head>
<body>

<div class="screen visible" id="screen-ob">
  <div class="ob-wrap" id="ob-inner"></div>
</div>

<div class="screen" id="screen-app">
  <div class="nav-bar">
    <div class="nav-logo">
      <div class="nav-logo-mark">Ph</div>
      <div class="nav-logo-name">Phantom</div>
    </div>
    <div class="nav-links">
      <div class="nav-link active" onclick="goTab('today')" id="nl-today">Today</div>
      <div class="nav-link" onclick="goTab('programme')" id="nl-programme">Programme</div>
      <div class="nav-link" onclick="goTab('progress')" id="nl-progress">Progress</div>
      <div class="nav-link" onclick="goTab('profile')" id="nl-profile">Profile</div>
    </div>
  </div>

  <div class="app-tab" id="tab-today">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem">
      <div>
        <div style="font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.5px" id="t-greeting">Good morning</div>
        <div style="font-size:13px;color:var(--text2);margin-top:3px" id="t-sub">—</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:13px;font-weight:700;color:var(--yellow)" id="t-block">Block 1</div>
        <div style="font-size:11px;color:var(--text2)" id="t-week">Week 1 of 4</div>
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat-c"><div class="stat-n" id="s-sess">0</div><div class="stat-l">Sessions</div></div>
      <div class="stat-c"><div class="stat-n" id="s-sets">0</div><div class="stat-l">Sets logged</div></div>
      <div class="stat-c"><div class="stat-n" id="s-pbs">0</div><div class="stat-l">PBs set</div></div>
      <div class="stat-c"><div class="stat-n" id="s-wk">1</div><div class="stat-l">Week</div></div>
    </div>
    <div class="day-strip" id="day-strip"></div>
    <div id="t-session"></div>
    <div id="t-modal"></div>
  </div>

  <div class="app-tab" id="tab-programme">
    <div style="font-size:24px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-.5px" id="p-title">Programme</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:1.25rem" id="p-sub">—</div>
    <div class="week-nav">
      <button class="wk-btn active" onclick="setPW(1,this)">Week 1</button>
      <button class="wk-btn" onclick="setPW(2,this)">Week 2</button>
      <button class="wk-btn" onclick="setPW(3,this)">Week 3</button>
      <button class="wk-btn w4" onclick="setPW(4,this)">Week 4 🔥</button>
    </div>
    <div id="p-content"></div>
  </div>

  <div class="app-tab" id="tab-progress">
    <div style="font-size:24px;font-weight:800;color:var(--text);margin-bottom:4px;letter-spacing:-.5px">Progress</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:1.25rem" id="pr-sub">—</div>
    <div class="stats-grid">
      <div class="stat-c"><div class="stat-n" id="pr-sets">0</div><div class="stat-l">Sets</div></div>
      <div class="stat-c"><div class="stat-n" id="pr-vol">0<span style="font-size:12px">kg</span></div><div class="stat-l">Volume</div></div>
      <div class="stat-c"><div class="stat-n" id="pr-pbs">0</div><div class="stat-l">PBs</div></div>
      <div class="stat-c"><div class="stat-n" id="pr-sess">0</div><div class="stat-l">Sessions</div></div>
    </div>
    <div class="card"><div class="card-head"><div class="card-title">Personal bests</div></div><div id="pr-pblist" style="padding:.5rem 0"></div></div>
  </div>

  <div class="app-tab" id="tab-profile">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:1.5rem">
      <div style="width:54px;height:54px;border-radius:50%;background:var(--yellow);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#000" id="pf-av">?</div>
      <div>
        <div style="font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.3px" id="pf-name">—</div>
        <div style="font-size:13px;color:var(--text2)" id="pf-sub">—</div>
      </div>
    </div>
    <div id="pf-editable"></div>
    <button class="btn-danger" onclick="fullReset()">Reset & restart</button>
  </div>

  <div class="bottom-nav">
    <div class="bn-item active" onclick="goTab('today')" id="bn-today"><i class="ti ti-bolt bn-icon"></i><span class="bn-label">Today</span></div>
    <div class="bn-item" onclick="goTab('programme')" id="bn-programme"><i class="ti ti-calendar bn-icon"></i><span class="bn-label">Programme</span></div>
    <div class="bn-item" onclick="goTab('progress')" id="bn-progress"><i class="ti ti-chart-bar bn-icon"></i><span class="bn-label">Progress</span></div>
    <div class="bn-item" onclick="goTab('profile')" id="bn-profile"><i class="ti ti-user bn-icon"></i><span class="bn-label">Profile</span></div>
  </div>
</div>

// Filter exercises by available equipment
// An exercise is available if ALL its required equipment is in the user's equip list,
// OR it has no requirements (bodyweight)
function filterExByEquip(sessionType, equip) {
  const all = ALL_EX[sessionType] || ALL_EX['Total Body A'];
  const available = all.filter(ex => {
    if (ex.needs.length === 0) return true; // bodyweight — always available
    // check if user has at least one piece that satisfies
    // Some exercises need ALL items in needs[], some need ANY
    // Convention: needs[] means ALL required
    // Special: 'Full gym' covers everything
    if (equip.includes('Full gym')) return true;
    return ex.needs.every(n => equip.includes(n));
  });
  // Return at least 4, prefer 5 exercises
  if (available.length === 0) {
    // absolute fallback — bodyweight only
    return all.filter(ex => ex.needs.length === 0).slice(0, 5);
  }
  return available.slice(0, 5);
}

async function generate(){
  document.getElementById('gen-btn').disabled=true;
  const af=activeFull();
  const sLabel=STRUCTURES.find(s=>s.id===P.structure)?.label||P.structure;
  const equip=P.equip.length?P.equip.join(', '):'Dumbbells only';
  const inj=(P.injuries.length&&!P.injuries.includes('None'))?P.injuries.join(', '):'None';
  const structInstr={PPL_UL:'Rotate Push, Pull, Legs, Upper, Lower across training days.',PPL:'Rotate Push, Pull, Legs across training days.',UL:'Alternate Upper body and Lower body sessions.',MSG:'Assign: Chest & Triceps, Back & Biceps, Legs, Shoulders, Arms in order.',TB:'Every training day is a Total Body session.',CIRCUIT:'Every training day is a Circuit session.'};
  document.getElementById('ob-inner').innerHTML=`<div class="generating-wrap"><div class="spinner"></div><div style="font-size:18px;font-weight:800;color:var(--yellow);margin-top:1.5rem;letter-spacing:-.3px">Building your programme</div><div style="font-size:13px;color:var(--text2);margin-top:4px">${P.name} · ${sLabel}</div><div class="gen-steps">${['Analysing your profile','Designing '+sLabel+' structure','Filtering exercises to: '+equip,'Calculating progressive overload','Adding coaching notes'].map((s,i)=>`<div class="gen-step ${i===0?'ga':''}" id="gs${i}"><div class="gen-dot ${i===0?'ga':''}"></div>${s}</div>`).join('')}</div></div>`;
  [800,1600,2400,3200].forEach((t,i)=>setTimeout(()=>{const prev=document.getElementById('gs'+i);const next=document.getElementById('gs'+(i+1));if(prev){prev.classList.replace('ga','gd');prev.querySelector('.gen-dot')?.classList.replace('ga','gd');}if(next){next.classList.add('ga');next.querySelector('.gen-dot')?.classList.add('ga');}},t));

  const prompt=`You are Phantom, an expert personal trainer AI. Generate a complete 4-week progressive ${P.type} programme.
PROFILE: Name=${P.name}, Structure=${sLabel}, Goal=${P.goal}, Experience=${P.exp}, Age=${P.age}, Weight=${P.weight}kg, Sex=${P.sex}
Training days (ONLY these): ${af.join(', ')}
Session time: ${P.time} minutes
AVAILABLE EQUIPMENT (CRITICAL — only use exercises that require this equipment): ${equip}
Injuries / avoid: ${inj}
STRUCTURE INSTRUCTION: ${structInstr[P.structure]||structInstr.PPL_UL}

STRICT RULES:
1. Output ONLY valid JSON. No markdown. No explanation.
2. "days" array must have EXACTLY 7 items: Sunday, Monday, Tuesday, Wednesday, Thursday, Friday, Saturday.
3. Non-training days: isRest:true, no exercises field.
4. Training days: isRest:false, unique sessionType, 4-6 exercises, finisher string.
5. CRITICAL: Every exercise MUST be achievable with ONLY the available equipment: ${equip}. Do NOT include barbell exercises if Barbell is not listed. Do NOT include cable exercises if Cable machine is not listed. Bodyweight exercises are always fine.
6. Each training day must have DIFFERENT exercises from other training days.
7. Avoid exercises loading: ${inj}.
8. Weeks 2,3,4 must have progressively heavier targetWeight than week 1.
Return: {"programmeTitle":"string","summary":"string","weeks":[{"week":1,"days":[{"day":"Sunday","isRest":true},{"day":"Monday","isRest":false,"sessionType":"Push","duration":"${P.time} min","exercises":[{"name":"Exercise","sets":4,"reps":"6-8","targetWeight":"60kg","notes":"cue"}],"finisher":"description"},...5 more days]}],"phantomNotes":["note1","note2","note3"]}
Generate all 4 weeks with progressive weights.`;

  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':ST.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const raw=data.content?.map(b=>b.text||'').join('')||'';
    const parsed=JSON.parse(raw.replace(/^```(?:json)?\s*/,'').replace(/\s*```$/,'').trim());
    if(!isValidProg(parsed))throw new Error('Invalid structure');
    ST.programme=parsed;
  }catch(e){console.warn('AI failed, using fallback:',e.message);ST.programme=buildFallback();}
  ST.onboarded=true;save();setTimeout(()=>launchApp(),300);
}

function buildFallback(){
  const af=activeFull();
  const seq=SEQ[P.structure]||SEQ.PPL_UL;
  const sLabel=STRUCTURES.find(s=>s.id===P.structure)?.label||P.structure;
  return{
    programmeTitle:`${P.name}'s 4-week ${P.type} programme`,
    summary:`A ${P.exp.toLowerCase()} ${P.type.toLowerCase()} programme using the ${sLabel} structure. All exercises selected for your available equipment.`,
    phantomNotes:['Weights increase ~2.5kg each week — stick to the targets.',`Sessions are ${P.time} minutes including warm-up.`,`All exercises use only: ${P.equip.length?P.equip.join(', '):'bodyweight'}.`],
    weeks:[1,2,3,4].map(wk=>({
      week:wk,
      days:DAYS.map(fullDay=>{
        const isTraining=af.includes(fullDay);
        if(!isTraining)return{day:fullDay,isRest:true};
        const tIdx=af.indexOf(fullDay);
        const sType=seq[tIdx%seq.length];
        // KEY FIX: filter exercises by equipment
        const baseExs=filterExByEquip(sType,P.equip);
        const adj=WK_ADJ[wk-1];
        return{
          day:fullDay,sessionType:sType,isRest:false,duration:`${P.time} min`,
          exercises:baseExs.map(ex=>{
            const b=parseFloat(ex.tw);
            return{name:ex.name,sets:ex.sets,reps:ex.reps,targetWeight:!isNaN(b)?(Math.round((b+adj)*2)/2)+'kg':ex.tw,notes:ex.notes};
          }),
          finisher:'3 rounds: 10 press-ups + 10 bodyweight squats, 30s rest'
        };
      })
    }))
  };
}

  document.querySelectorAll('.app-tab').forEach(t=>t.style.display='none');
  document.getElementById('tab-today').style.display='block';

  document.getElementById('nl-today').classList.add('active');
  document.getElementById('bn-today').classList.add('active');
  viewDayIdx=new Date().getDay();progWeek=ST.week;
  refreshToday();
}

function goTab(name){
  document.querySelectorAll('.app-tab').forEach(t=>t.style.display='none');
  document.getElementById('tab-'+name).style.display='block';
  document.querySelectorAll('.nav-link,.bn-item').forEach(el=>el.classList.remove('active'));

function refreshToday(){updateHeader();renderDayStrip();renderSession();}

function updateHeader(){
  const hr=new Date().getHours();
  const greet=hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';
  const vd=DAYS[viewDayIdx];
  const wk=ST.programme?.weeks.find(w=>w.week===ST.week)||ST.programme?.weeks[0];
  const sess=wk?.days[viewDayIdx];
  const sDesc=(sess&&!sess.isRest)?` · ${sess.sessionType}`:'· Rest day';
  document.getElementById('t-greeting').textContent=`${greet}, ${P.name}`;
  document.getElementById('t-sub').textContent=`Block ${ST.block} · Week ${ST.week} · ${vd} ${sDesc}`;
  document.getElementById('t-block').textContent=`Block ${ST.block}`;
  document.getElementById('t-week').textContent=`Week ${ST.week} of 4`;
  document.getElementById('s-sess').textContent=ST.totalSessions;
  document.getElementById('s-sets').textContent=ST.totalSets;
  document.getElementById('s-pbs').textContent=Object.keys(ST.pbs).length;
  document.getElementById('s-wk').textContent=ST.week;
  document.getElementById('pf-av').textContent=avInit(P.name)||'?';
  document.getElementById('pf-name').textContent=P.name;
  document.getElementById('pf-sub').textContent=`Block ${ST.block} · ${P.exp} · ${P.type}`;
}

function renderDayStrip(){
  const strip=document.getElementById('day-strip');
  const todayIdx=new Date().getDay();
  const wk=ST.programme?.weeks.find(w=>w.week===ST.week)||ST.programme?.weeks[0];
  strip.innerHTML=DAYS.map((fullDay,idx)=>{
    const dayData=wk?.days[idx];
    const isRest=!dayData||dayData.isRest;
    const isToday=idx===todayIdx;
    const isViewing=idx===viewDayIdx;
    return`<div class="ds-btn${isRest?' rest-day':''}${isViewing?' viewing':''}${isToday?' today-dot':''}" onclick="viewDayIdx=${idx};renderDayStrip();renderSession();updateHeader()" title="${fullDay}">${DAYS_SHORT[idx]}</div>`;
  }).join('');
}

function renderSession(){
  const c=document.getElementById('t-session');
  if(!ST.programme){c.innerHTML='';return;}
  const vd=DAYS[viewDayIdx];
  const wk=ST.programme.weeks.find(w=>w.week===ST.week)||ST.programme.weeks[0];
  const dayData=wk?.days[viewDayIdx];
  if(!dayData||dayData.isRest){c.innerHTML=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;text-align:center"><div style="font-size:32px;margin-bottom:.75rem">🌙</div><div style="font-size:16px;font-weight:700;color:var(--text)">Rest day</div><div style="font-size:13px;color:var(--text2);margin-top:6px">${vd} — recovery is where the gains happen.</div></div>`;return;}
  const sk=`w${ST.week}:${viewDayIdx}`;
  const exs=dayData.exercises||[];
  const logged=ST.loggedSets[sk]||{};
  const totalSets=exs.reduce((a,e)=>a+e.sets,0);
  const doneSets=exs.reduce((a,_,i)=>a+(logged[i]?.length||0),0);
  const pct=totalSets>0?Math.round((doneSets/totalSets)*100):0;
  const allDone=doneSets>=totalSets&&totalSets>0;
  const colors={Push:'var(--yellow)',Pull:'var(--orange)',Legs:'var(--pink)','Total Body A':'var(--yellow)','Total Body B':'var(--orange)',Circuit:'var(--pink)',Upper:'var(--yellow)',Lower:'var(--orange)','Chest & Triceps':'var(--yellow)','Back & Biceps':'var(--orange)',Shoulders:'var(--pink)',Arms:'var(--yellow)'};
  const badgeColor=colors[dayData.sessionType]||'var(--yellow)';
  c.innerHTML=`<div class="card">
    <div class="card-head">
      <div><div style="font-size:15px;font-weight:700;color:var(--text)">${vd} — ${dayData.sessionType}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">⏱ ${dayData.duration} · ${exs.length} exercises · Week ${ST.week}</div></div>
      <span class="sess-badge" style="background:${badgeColor};color:#000">${dayData.sessionType}</span>
    </div>

    <table class="ex-table">
      <thead><tr><th style="width:40%">Exercise</th><th>Sets</th><th>Target</th><th>Log</th></tr></thead>
      <tbody>${exs.map((ex,i)=>{const sets=logged[i]||[];const exDone=sets.length>=ex.sets;const isPB=ST.pbs[ex.name]&&sets.some(s=>s.w>0&&s.w>=(ST.pbs[ex.name]-0.01));return`<tr><td><div style="font-size:13px;font-weight:600;color:var(--text)">${ex.name}${isPB?` <span style="background:var(--pink);color:#fff;padding:1px 7px;border-radius:10px;font-size:10px;font-weight:700">PB</span>`:''}</div><div style="font-size:11px;color:var(--text3);margin-top:2px">${ex.notes||''}</div></td><td style="text-align:center"><div style="font-size:13px;font-weight:700;color:var(--text)">${ex.sets}</div><div style="font-size:11px;color:var(--text3)">${sets.length}/${ex.sets}</div></td><td style="text-align:center"><div style="font-size:13px;font-weight:700;color:var(--yellow)">${ex.targetWeight}</div><div style="font-size:11px;color:var(--text3)">${ex.reps}</div></td><td style="text-align:center"><button class="log-btn ${exDone?'done':''}" onclick="openModal('${sk}',${i})">${exDone?'✓':'Log'}</button></td></tr>`;}).join('')}</tbody>
    </table>
    <div class="progress-wrap"><div class="progress-header"><span>Session progress</span><span>${pct}%</span></div><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div></div>
    ${dayData.finisher?`<div class="finisher-card"><div class="finisher-title">⚡ Finisher</div><div class="finisher-item">${dayData.finisher}</div></div>`:''}
    ${allDone?`<button class="btn-pri" style="margin:0 1.25rem 1.25rem;width:calc(100% - 2.5rem)" onclick="completeSession()">✓ Complete session</button>`:''}
  </div>`;
}

function completeSession(){ST.totalSessions++;ST.week=Math.min(ST.week+1,4);save();refreshToday();}

function openModal(sk,exIdx){modalCtx={sk,exIdx};rpe=null;renderModal();}
function closeModal(){modalCtx=null;document.getElementById('t-modal').innerHTML='';}

function renderModal(){
  if(!modalCtx){document.getElementById('t-modal').innerHTML='';return;}
  const{sk,exIdx}=modalCtx;
  const wk=ST.programme.weeks.find(w=>w.week===ST.week)||ST.programme.weeks[0];
  const ex=wk?.days[viewDayIdx]?.exercises[exIdx];
  if(!ex)return;
  const logged=ST.loggedSets[sk]?.[exIdx]||[];
  const nextSet=logged.length+1;
  const pb=ST.pbs[ex.name]||0;
  const rpes=['Easy','Moderate','Hard','Very hard','Max'];
  document.getElementById('t-modal').innerHTML=`<div style="position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:flex-end;justify-content:center;z-index:100" onclick="if(event.target===this)closeModal()"><div style="background:var(--bg2);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:680px;overflow:hidden;border-top:2px solid var(--yellow)"><div style="width:40px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0"></div><div style="padding:1rem 1.25rem .75rem;border-bottom:1px solid var(--border)"><div style="font-size:15px;font-weight:700;color:var(--text)">${ex.name}</div><div style="font-size:12px;color:var(--text2);margin-top:2px">Set ${nextSet} of ${ex.sets} · Target: <span style="color:var(--yellow);font-weight:700">${ex.targetWeight}</span> · PB: ${pb>0?`<span style="color:var(--pink);font-weight:700">${pb}kg</span>`:'—'}</div></div><div style="padding:1.25rem"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1rem"><div><div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;font-weight:700">Weight (kg)</div><input type="number" step="0.5" id="m-w" style="width:100%;padding:12px;border-radius:var(--radius);border:1px solid var(--border2);font-size:24px;font-weight:800;color:var(--yellow);background:var(--bg3);text-align:center" placeholder="${ex.targetWeight?.replace(/[^0-9.]/g,'')||''}" /></div><div><div style="font-size:11px;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;font-weight:700">Reps completed</div><input type="number" id="m-r" style="width:100%;padding:12px;border-radius:var(--radius);border:1px solid var(--border2);font-size:24px;font-weight:800;color:var(--yellow);background:var(--bg3);text-align:center" placeholder="${ex.reps?.split('-')[1]||ex.reps?.split(' ')[0]||'—'}" /></div></div><div style="display:flex;gap:5px 3px;border-radius:var(--radius);border:1px solid var(--border2);font-size:11px;font-weight:700;cursor:pointer;background:${rpe===i?'var(--yellow)':'var(--bg3)'};color:${rpe===i?'#000':'var(--text3)'};transition:all .15s" onclick="rpe=${i};renderModal()">${l}</button>`).join('')}</div><textarea id="m-notes" style="width:100%;padding:10px 12px;border-radius:var(--radius);border:1px solid var(--border2);font-size:13px;color:var(--text);background:var(--bg3);resize:none;font-family:var(--font)" rows="2" placeholder="Notes..."></textarea></div><div style="display:grid;grid-template-columns:1fr 2fr;gap:8px;padding:0 1.25rem 1.25rem"><button style="padding:12px;border-radius:var(--radius);border:1px solid var(--border2);background:transparent;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer" onclick="closeModal()">Cancel</button><button class="btn-pri" style="margin:0" onclick="saveSet()">Save set ${nextSet} →</button></div></div></div>`;
  setTimeout(()=>document.getElementById('m-w')?.focus(),80);
}
</script>
